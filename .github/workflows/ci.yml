name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182  # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check with mypy
        run: uv run mypy src/

      - name: Security audit
        run: uv run pip-audit

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml --cov-report=term-missing --cov-fail-under=70 --junitxml=test-results.xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
          fail_ci_if_error: false

      - name: Generate test badge
        if: always() && matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p badges
          python -c "
          import json, xml.etree.ElementTree as ET
          root = ET.parse('test-results.xml').getroot()
          suites = root.findall('testsuite') if root.tag == 'testsuites' else [root]
          tests = sum(int(s.attrib.get('tests', 0)) for s in suites)
          failures = sum(int(s.attrib.get('failures', 0)) for s in suites)
          errors = sum(int(s.attrib.get('errors', 0)) for s in suites)
          passed = tests - failures - errors
          badge = {
              'schemaVersion': 1,
              'label': 'tests',
              'message': f'{passed}/{tests} passed' if failures + errors > 0 else f'{passed} passed',
              'color': 'red' if failures + errors > 0 else 'brightgreen'
          }
          with open('badges/test-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Commit badge
        if: always() && matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/test-badge.json
          git diff --cached --quiet || git commit -m "ci: update test badge [skip ci]"
          git push
