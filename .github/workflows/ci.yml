name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182  # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check with mypy
        run: uv run mypy src/

      - name: Security audit
        # pip-audit exits non-zero on any known vulnerability (default behavior);
        # --strict additionally fails the run if dependency metadata cannot be
        # collected, so transient registry issues cannot silently produce a
        # green build with unknown coverage. Do not add `|| true` or ignore
        # lists without a CVE reference and a remediation deadline.
        run: uv run pip-audit --strict

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
          fail_ci_if_error: false
